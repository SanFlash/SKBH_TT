services:
  - type: web
    name: table-tennis-tournament
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tournament-db
          property: connectionString
      - key: PORT
        value: 10000
    disk:
      name: tournament-data
      mountPath: /var/lib/tournament
      sizeGB: 1

databases:
  - name: tournament-db
    databaseName: tournament_db
    user: tournament_user
    plan: starter